<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
		/>
		<title>Whalejet</title>

		<link rel="shortcut icon" content="favicon.webp" />
	
		<script src="/scram/scramjet.all.js"></script>
		<script src="/baremux/index.js"></script>
		
		<link rel="stylesheet" href="index.css" />
		<script src="register-sw.js" defer></script>
		<script src="search.js" defer></script>
		<script src="index.js" defer></script>
	</head>

	<body>
		<div title="Whalejet Logo" class="flex-center logo-wrapper header-center">
			<img class="logo" src="wj.png" alt="Whalejet" />
			<h1>Whalejet</h1>
		</div>
		<div class="flex-center desc left-margin">
			<p>
				Whalejet is a really cool non-web proxy that totally doesn't let you 
				do things that a web proxy would let you do.
			</p>
		</div>

		<form id="sj-form" class="flex-center">
			<input
				id="sj-search-engine"
				value="https://www.google.com/search?q=%s"
				type="hidden"
			/>
			<input id="sj-address" type="text" placeholder="Search the web freely" />
		</form>
		<div class="desc left-margin">
			<p id="sj-error"></p>
			<pre id="sj-error-code"></pre>
		</div>
		<footer>
			<div>
				<span>Whalejet &copy; 2026</span>
			</div>
		</footer>
	</body>
</html>
